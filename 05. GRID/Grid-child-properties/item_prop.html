<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid child property</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .container {
        max-width: 1000px;
        height: 600px;
        margin: auto;
        gap: 10px;
        border: 1px solid;
        display: grid;
        grid-template-columns: 100px 100px 100px 100px;
        grid-template-rows: 100px 100px 100px 100px;
      }
      .item {
        border: 1px solid black;
      }
      /*#item1 {
      grid-column:1/3;
        /* grid-column-start: 1;
        grid-column-end: 3; */
      /* grid-column: span 2; */
      /* } */
      /* #item2 {
        grid-row: span 4;
      } */
      #item1 {
        grid-area: 1/1/3/3; /*1-row start, 1- column start 3- row end, 4- column end  */
        /* justify self, align-self  */
        /* justify-self: center; */
        /* align-self: start; */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item" id="item1">Item1</div>
      <div class="item" id="item2">Item2</div>
      <div class="item">Item3</div>
      <div class="item">Item4</div>
      <div class="item">Item5</div>
      <div class="item">Item6</div>
      <div class="item">Item7</div>
      <div class="item">Item8</div>
    </div>
  </body>
</html>
