<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area</title>
    <style>
      /* This css for grid-template-area */
      * {
        padding: 0px;
        font-family: sans-serif;
      }
      .container {
        max-width: 1250px;
        height: 750px;
        margin: auto;
        column-gap: 5px;
        border: 1px solid;
        display: grid;
        grid-template-columns: 400px 1fr;
        grid-template-rows: repeat(3, 250px);
        grid-template-areas: "header header" "content sidebar" "footer footer";
      }
      .header {
        border: 1px solid;
        background-color: red;
        grid-area: header;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
        font-weight: bold;
      }
      .content {
        border: 1px solid;
        background-color: green;
        grid-area: content;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
        font-weight: bold;
      }
      .sidebar {
        border: 1px solid;
        background-color: blue;
        grid-area: sidebar;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
        font-weight: bold;
      }
      .footer {
        border: 1px solid;
        background-color: rgb(14, 226, 245);
        grid-area: footer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
        font-weight: bold;
      }
      /* Responsive Design by use of media query */
      @media (max-width: 575px) {
        .container {
          grid-template-columns: 1fr;
          grid-template-areas: "header" "content" "sidebar" "footer";
        }
      }
      h1 {
        font-family: cursive;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Grid-template-areas: Use for devide of section  -->

    <h1>Structure of Home page using of grid</h1>
    <div class="container">
      <div class="header">Header</div>
      <div class="content">Content</div>
      <div class="sidebar">Sidebar</div>
      <div class="footer">Footer</div>
    </div>
  </body>
</html>
