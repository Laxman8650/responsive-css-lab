<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        text-align: center;
        font-family: cursive;
        text-decoration: red dotted underline;
      }
      .container {
        height: 500px;
        width: 500px;
        margin-top: 10px;
        margin-left: 200px;
        background-color: cadetblue;
        border: 3px solid;
        /* Display Flex */
        display: flex;
        /* Flex Direction- Row→, Row-reverse←, column↓, column-reverse↟ */
        flex-direction: column-reverse;
      }
      #box1 {
        height: 60px;
        width: 55px;
        background-color: red;
        border: 2px solid;
        margin: 5px;
      }
      #box2 {
        height: 60px;
        width: 55px;
        background-color: rgb(5, 29, 250);
        border: 2px solid;
        margin: 5px;
      }
      #box3 {
        height: 60px;
        width: 55px;
        background-color: rgb(102, 255, 0);
        border: 2px solid;
        margin: 5px;
      }
      #box4 {
        height: 60px;
        width: 55px;
        background-color: rgb(255, 0, 238);
        border: 2px solid;
        margin: 5px;
      }
      #box5 {
        height: 60px;
        width: 55px;
        background-color: rgb(255, 191, 0);
        border: 2px solid;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Flex Container</h1>
    <div class="container">
      <div id="box1" class="box">Item 1</div>
      <div id="box2" class="box">Item 2</div>
      <div id="box3" class="box">Item 3</div>
      <div id="box4" class="box">Item 4</div>
      <div id="box5" class="box">Item 5</div>
    </div>
  </body>
</html>
