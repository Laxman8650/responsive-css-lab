<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile _card</title>
    <style>
      body {
        background-color: rgb(148, 45, 104);
      }
      .pf-container {
        position: absolute;
        top: 50%;
        left: 50%;
        border: 2px solid;
        transform: translate(-50%, -50%);
        width: 250px;
        height: 350px;
        background-color: rgb(22, 218, 221);
        box-sizing: border-box;
        overflow: hidden;
      }
      .head-container {
        width: 100%;
        text-align: center;
      }
      .head-container h1 {
        margin: 0;
        padding: 8px 0;
      }
      .pf-img {
        height: 80px;
        width: 80px;
        background-color: aquamarine;
        border: 2px solid;
        border-radius: 50%;
        margin-left: 80px;
      }
      .pf-img p {
        text-align: center;
        font-size: 12px;
        font-family: cursive;
        margin-top: -13px;
        margin-right: 5px;
        color: darkmagenta;
      }
      h2 {
        padding-right: 50px;
        padding-top: 2px;
        font-size: 14px;
        width: 95px;
      }
      .pf-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 50%;
      }

      .content {
        text-align: center;
        padding-top: 70px;
      }
      footer .brand {
        display: block;
        text-align: center;
        background-color: rgb(0, 0, 0);
        font-family: cursive;
        color: white;
        height: 25.2px;
        margin-top: 12px;
        padding-top: 2px;
        width: 100%;
        box-sizing: border-box;
      }
      .title {
        font-family: cursive;
        text-align: center;
        position: absolute;
        color: white;
        text-shadow: 2px 2px 4px black;
        top: 11%;
        left: 43%;
      }
    </style>
  </head>
  <body>
    <h1 class="title">Profile Card</h1>
    <div class="pf-container">
      <header class="head-container">
        <h1>TCS</h1>
      </header>
      <main>
        <section class="pp">
          <div class="pf-img">
            <img src="/assets/images/pass.jpg" alt="Laxman image" />
            <h2>Laxman Singh</h2>
            <p>Web Developer</p>
          </div>
        </section>

        <section>
          <div class="content">
            <p>Id : 984587954</p>
            <p>Dob: 15/05/1999</p>
            <p>Email: Laxman@gamil.com</p>
          </div>
        </section>
      </main>
      <footer>
        <span class="brand">/TCS</span>
      </footer>
    </div>
  </body>
</html>
