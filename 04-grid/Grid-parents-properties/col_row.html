<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Column and Row Properties</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        padding: 20px;
        margin: auto;
        height: 900px;
        width: 800px;
        border: 2px solid;
        display: grid;
        /* This property is grid template-columns (4 types) */
        /* grid-template-columns: 30% 35% 30%; */
        /* grid-template-columns: repeat(3, 1fr); */
        grid-template-columns: 250px 250px 250px;
        /* grid-template-columns: 1fr 2fr 1fr; */

        /* This property is grid-template-rows(2 types) it's measure the height of row */
        grid-template-rows: 280px 280px 280px;
        gap: 10px 10px;
      }
      .box {
        border: 2px solid;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">box1</div>
      <div class="box">box2</div>
      <div class="box">box3</div>
      <div class="box">box4</div>
      <div class="box">box5</div>
      <div class="box">box6</div>
      <div class="box">box7</div>
    </div>
  </body>
</html>
