<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drop Shadow</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Boogaloo&family=Griffy&family=Jost:ital,wght@0,100..900;1,100..900&family=Joti+One&family=Kranky&family=Nabla&family=Oswald:wght@200..700&family=Playwrite+AU+QLD:wght@100..400&display=swap");
      body {
        background-color: black;
        color: white;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Jost;
      }
      .mainContainer {
        display: flex;
        justify-content: space-around;
        align-items: center;
        height: 100vh;
      }
      .section {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .section2 {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .section2 img {
        height: 400px;
        width: 100%;
        filter: drop-shadow(0px 15px 6px #fbfafa);
      }
      section h1 {
        font-size: 50px;
        font-weight: 600;
        /* text-shadow: 0px 3px 2px rgba(253, 252, 252, 0.86); */
        color: rgb(254, 216, 4);
      }
      section p {
        font-size: 20px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <section class="mainContainer">
      <div class="section">
        <h1>Drop Shadow</h1>
        <p>
          Drop shadow effect use for creating depth and dimension in elements.
        </p>
      </div>
      <div class="section2">
        <img src="/assets/images/3d image1.png" />
      </div>
    </section>
  </body>
</html>
