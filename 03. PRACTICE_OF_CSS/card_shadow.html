<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Shadow</title>
    <style>
      body {
        font-family: cursive;
        color: rgb(8, 8, 8);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .main-card {
        margin: 30px auto;
        width: 250px;
        box-shadow:
          rgba(0, 0, 0, 0.25) 0px 54px 55px,
          rgba(0, 0, 0, 0.12) 0px -12px 30px,
          rgba(0, 0, 0, 0.12) 0px 4px 6px,
          rgba(0, 0, 0, 0.17) 0px 12px 13px,
          rgba(0, 0, 0, 0.09) 0px -3px 5px;
        overflow: hidden;
      }

      .container1 {
        height: 200px;
        width: 100%;
      }

      .container1 img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-bottom: 1px solid #080808;
      }

      .container2 {
        padding: 20px;
        background-color: #fcfbfb;
        color: rgb(8, 8, 8);
        text-align: center;
      }
      .container2 p {
        font-size: 30px;
        font-weight: 600;
        font-variant: small-caps;
        text-shadow: 0px 13px 9px rgba(4, 4, 4, 0.86);
      }
    </style>
  </head>
  <body>
    <div class="main-card">
      <div class="container1">
        <img src="/assets/images/unistall.jpg" alt="Nature" />
      </div>

      <div class="container2">
        <p>Remember</p>
      </div>
    </div>
  </body>
</html>
