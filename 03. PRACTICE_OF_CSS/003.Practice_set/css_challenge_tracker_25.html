<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Challenge Tracker</title>
  </head>
  <body>
    <h2 class="sr-only">
      CSS Challenge Tracker — 25 questions across Basic, Medium, and Tough
      difficulty
    </h2>

    <div class="app-shell">
      <h1 class="page-heading">CSS Challenge Tracker</h1>
      <p class="page-description">
        25 design challenges across Basic, Medium, and Tough categories with
        progress tracking built in.
      </p>

      <div class="tracker-card">
        <div class="top-summary">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 8px;
            "
          >
            <span style="font-size: 13px; color: var(--color-text-secondary)"
              >Overall progress</span
            >
            <span
              style="
                font-size: 13px;
                font-weight: 500;
                color: var(--color-text-primary);
              "
              id="prog-text"
              >0 / 25</span
            >
          </div>
          <div
            style="
              height: 6px;
              background: var(--color-background-secondary);
              border-radius: 99px;
              overflow: hidden;
              border: 0.5px solid var(--color-border-tertiary);
            "
          >
            <div
              id="prog-bar"
              style="
                height: 100%;
                width: 0%;
                background: #1d9e75;
                border-radius: 99px;
                transition: width 0.35s ease;
              "
            ></div>
          </div>
          <div
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 8px;
              margin-top: 12px;
            "
          >
            <div
              style="
                background: var(--color-background-secondary);
                border-radius: var(--border-radius-md);
                padding: 10px 12px;
                border: 0.5px solid var(--color-border-tertiary);
                text-align: center;
              "
            >
              <div
                style="
                  font-size: 18px;
                  font-weight: 500;
                  color: var(--color-text-primary);
                "
                id="cnt-basic"
              >
                0/8
              </div>
              <div
                style="
                  font-size: 12px;
                  color: var(--color-text-secondary);
                  margin-top: 2px;
                "
              >
                Basic
              </div>
            </div>
            <div
              style="
                background: var(--color-background-secondary);
                border-radius: var(--border-radius-md);
                padding: 10px 12px;
                border: 0.5px solid var(--color-border-tertiary);
                text-align: center;
              "
            >
              <div
                style="
                  font-size: 18px;
                  font-weight: 500;
                  color: var(--color-text-primary);
                "
                id="cnt-med"
              >
                0/9
              </div>
              <div
                style="
                  font-size: 12px;
                  color: var(--color-text-secondary);
                  margin-top: 2px;
                "
              >
                Medium
              </div>
            </div>
            <div
              style="
                background: var(--color-background-secondary);
                border-radius: var(--border-radius-md);
                padding: 10px 12px;
                border: 0.5px solid var(--color-border-tertiary);
                text-align: center;
              "
            >
              <div
                style="
                  font-size: 18px;
                  font-weight: 500;
                  color: var(--color-text-primary);
                "
                id="cnt-tough"
              >
                0/8
              </div>
              <div
                style="
                  font-size: 12px;
                  color: var(--color-text-secondary);
                  margin-top: 2px;
                "
              >
                Tough
              </div>
            </div>
          </div>
        </div>

        <div id="sections"></div>
      </div>
    </div>

    <style>
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f8fafb;
        --color-border-secondary: #d1d5db;
        --color-border-tertiary: #e5e7eb;
        --color-text-primary: #111827;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;
        --border-radius-md: 14px;
        --border-radius-lg: 18px;
      }
      body {
        margin: 0;
        padding: 2rem 1rem 2.5rem;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(180deg, #eef4fb 0%, #f8fafc 100%);
        color: var(--color-text-primary);
      }
      .app-shell {
        max-width: 980px;
        margin: 0 auto;
      }
      .page-heading {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.5rem);
        letter-spacing: -0.03em;
        line-height: 1.05;
      }
      .page-description {
        margin: 0.75rem 0 1.6rem;
        color: var(--color-text-secondary);
        max-width: 680px;
        line-height: 1.6;
      }
      .tracker-card {
        background: var(--color-background-primary);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
      }
      .top-summary {
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--color-border-tertiary);
      }
      .q-item {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 0;
        border-bottom: 0.5px solid var(--color-border-tertiary);
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.2s ease,
          opacity 0.2s ease;
      }
      .q-item:hover {
        opacity: 1;
        background: #f7fbff;
        transform: translateX(1px);
      }
      .q-check {
        width: 20px;
        height: 20px;
        min-width: 20px;
        border-radius: 6px;
        border: 1.5px solid var(--color-border-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 1px;
        transition: all 0.15s;
      }
      .q-text {
        font-size: 15px;
        color: var(--color-text-primary);
        line-height: 1.8;
      }
      .sec-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 0 8px;
        margin-top: 1.25rem;
      }
      .sec-card {
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 12px 16px;
        margin-bottom: 1.5rem;
      }
      .sec-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--color-text-primary);
      }
      .sec-count {
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-left: auto;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .q-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 0.5px solid var(--color-border-tertiary);
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .q-item:last-child {
        border-bottom: none;
      }
      .q-item:hover {
        opacity: 0.8;
      }
      .q-check {
        width: 18px;
        height: 18px;
        min-width: 18px;
        border-radius: 4px;
        border: 1.5px solid var(--color-border-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 1px;
        transition: all 0.15s;
      }
      .q-check.done {
        background: #1d9e75;
        border-color: #1d9e75;
      }
      .q-check.done::after {
        content: "✓";
        font-size: 11px;
        color: #fff;
        font-weight: 500;
      }
      .q-text {
        font-size: 14px;
        color: var(--color-text-primary);
        line-height: 1.5;
      }
      .q-text.done {
        text-decoration: line-through;
        color: var(--color-text-tertiary);
      }
      .q-num {
        font-size: 12px;
        color: var(--color-text-tertiary);
        min-width: 22px;
        margin-top: 2px;
      }
      .sec-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 0 6px;
        margin-top: 8px;
      }
      .sec-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 99px;
      }
      .badge-basic {
        background: #eaf3de;
        color: #3b6d11;
      }
      .badge-med {
        background: #faeeda;
        color: #854f0b;
      }
      .badge-tough {
        background: #fcebeb;
        color: #a32d2d;
      }
      .sec-title {
        font-size: 15px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .sec-count {
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-left: auto;
      }
      .sec-card {
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 4px 14px 4px;
      }
    </style>

    <script>
      const data = {
        basic: {
          label: "Basic",
          badge: "badge-basic",
          total: 8,
          qs: [
            "Form page banao — name, email, password fields, submit button aur CSS se clean design do",
            "Horizontal navigation bar banao — colored background, links with hover color change effect",
            "Profile card banao — image, name, bio text; border-radius + box-shadow + padding use karo",
            "Button banao — hover par background change ho aur transform: scale() se thoda bada ho jaye",
            "Google Fonts se ek heading font + ek body font pair karo; h1, h2, p sab alag styling do",
            "Flexbox use karke ek div ko page ke bilkul center mein rako (horizontally + vertically)",
            "CSS Grid se 3-column photo gallery banao — responsive, equal size cards",
            "HTML table banao aur CSS se alternating row colors (zebra stripes) add karo",
          ],
        },
        med: {
          label: "Medium",
          badge: "badge-med",
          total: 9,
          qs: [
            "Responsive navbar banao — desktop par horizontal, mobile (max-width: 768px) par vertical stacked",
            "@keyframes se CSS loading spinner banao — rotating ring animation, no JavaScript",
            "Flexbox se 3 pricing cards banao — Basic / Pro / Enterprise; Pro wala highlighted hona chahiye",
            "Glassmorphism card banao — backdrop-filter: blur(), semi-transparent background, subtle border",
            "CSS Grid se asymmetric magazine layout banao — bada featured article + 2 side cards",
            "Custom styled checkbox aur radio buttons banao using appearance: none aur CSS only",
            "Position: sticky se header banao — scroll karne par shadow appear ho (JS allowed for class toggle)",
            "CSS :hover se tooltip banao — element pe hover karo toh tooltip show ho, JavaScript nahi",
            "Animated progress bar banao — page load par 0% se 80% tak smooth animate kare",
          ],
        },
        tough: {
          label: "Tough",
          badge: "badge-tough",
          total: 8,
          qs: [
            "Pure CSS accordion banao — checkbox hack use karo, FAQ questions expand/collapse, zero JavaScript",
            "CSS variables (--color-bg, --color-text etc.) se dark/light theme toggle banao, JS sirf class badlega",
            'CSS Grid "newspaper" front page banao — 1 big featured story + sidebar + 4 small story grid',
            "Pure CSS animated hamburger icon banao — 3 lines jo click par X mein transform ho (checkbox trick)",
            "CSS clip-path se hero section design karo — diagonal cut ya polygon shape background use karo",
            "CSS scroll-snap banao — 4 full-height sections jo snap-scroll karein (scroll-snap-type: y mandatory)",
            "CSS counters + ::before pseudo-element se custom styled numbered list banao (1.1, 1.2, 2.1 format)",
            "Complex loading screen banao — multiple @keyframes animations, staggered delays, final fade out",
          ],
        },
      };

      const state = {};
      Object.keys(data).forEach((k) =>
        data[k].qs.forEach((_, i) => (state[`${k}-${i}`] = false)),
      );

      function update() {
        let total = 0,
          doneBasic = 0,
          doneMed = 0,
          doneTough = 0;
        data.basic.qs.forEach((_, i) => {
          if (state[`basic-${i}`]) {
            total++;
            doneBasic++;
          }
        });
        data.med.qs.forEach((_, i) => {
          if (state[`med-${i}`]) {
            total++;
            doneMed++;
          }
        });
        data.tough.qs.forEach((_, i) => {
          if (state[`tough-${i}`]) {
            total++;
            doneTough++;
          }
        });
        document.getElementById("prog-text").textContent = `${total} / 25`;
        document.getElementById("prog-bar").style.width =
          `${Math.round((total / 25) * 100)}%`;
        document.getElementById("cnt-basic").textContent = `${doneBasic}/8`;
        document.getElementById("cnt-med").textContent = `${doneMed}/9`;
        document.getElementById("cnt-tough").textContent = `${doneTough}/8`;
        document.querySelectorAll(".q-check").forEach((el) => {
          const k = el.dataset.key;
          el.classList.toggle("done", !!state[k]);
          el.nextElementSibling.nextElementSibling.classList.toggle(
            "done",
            !!state[k],
          );
        });
      }

      function render() {
        const wrap = document.getElementById("sections");
        let html = "",
          qNum = 0;
        [
          ["basic", data.basic],
          ["med", data.med],
          ["tough", data.tough],
        ].forEach(([key, sec]) => {
          html += `<div class="sec-head">
      <span class="sec-title">${sec.label}</span>
      <span class="sec-badge ${sec.badge}">${sec.label}</span>
    </div>
    <div class="sec-card">`;
          sec.qs.forEach((q, i) => {
            qNum++;
            const k = `${key}-${i}`;
            html += `<div class="q-item" onclick="toggle('${k}')">
        <div class="q-check" data-key="${k}"></div>
        <span class="q-num">${qNum}.</span>
        <span class="q-text">${q}</span>
      </div>`;
          });
          html += "</div>";
        });
        wrap.innerHTML = html;
      }

      window.toggle = function (k) {
        state[k] = !state[k];
        update();
      };

      render();
      update();
    </script>
  </body>
</html>
