<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <!-- Create a HTML table and add alternating row colors (zebra stripes) using of CSS -->
    <table border="1 solid black">
      <caption style="text-align: center">
        Alternating Colour Table
      </caption>
      <tr>
        <th>Name</th>
        <th style="color: white; background-color: black">Age</th>
        <th>City</th>
      </tr>
      <tr>
        <td style="color: white; background-color: black">Mohit</td>
        <td>21</td>
        <td style="color: white; background-color: black">Tharali</td>
      </tr>
      <tr>
        <td>Jyoti</td>
        <td style="color: white; background-color: black">20</td>
        <td>Narayanbagar</td>
      </tr>
      <tr>
        <td style="color: white; background-color: black">Tanuja</td>
        <td>20</td>
        <td style="color: white; background-color: black">Mall Bajwar</td>
      </tr>
      <tr>
        <td>Sahil</td>
        <td style="color: white; background-color: black">21</td>
        <td>Karanpryag</td>
      </tr>
      <tr>
        <td style="color: white; background-color: black">Jhon Abhrahim</td>
        <td>32</td>
        <td style="color: white; background-color: black">Mumbai</td>
      </tr>
    </table>
  </body>
</html>
