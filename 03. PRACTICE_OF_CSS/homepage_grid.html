<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Structure Of Home Page</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .hpContainer {
        max-width: 1200px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        border: 1px solid;
        gap: 5px;
        padding: 10px 20px;
      }
      h1 {
        text-align: center;
        padding: 20px 0px;
        font-family:
          "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", "Lucida Sans",
          Arial, sans-serif;
      }
      .header {
        grid-column: span 2;
        height: 100px;
        border: 1px solid;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .content {
        grid-column: span 1;
        height: 100px;
        border: 1px solid;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .aside {
        grid-column: span 1;
        grid-row: span 2;
        height: 210px;
        border: 1px solid;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .footer {
        grid-column: span 2;
        height: 100px;
        border: 1px solid;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <!-- Structure Of Home Page using CSS Grid and grid columns, grid-rows -->
    <h1>Structure Of Home Page</h1>
    <div class="hpContainer">
      <div class="header">Header</div>
      <div class="content">Content</div>
      <div class="aside">Aside</div>
      <div class="content">Content</div>
      <div class="footer">Footer</div>
    </div>
  </body>
</html>
