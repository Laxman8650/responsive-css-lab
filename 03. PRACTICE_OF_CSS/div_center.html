<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Div center</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        height: 200px;
        width: 300px;
        background: 2px solid;
        background-color: chartreuse;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <!-- Div Center using of flex box(horizontally , vertically) -->

    <div class="box">Box1</div>
  </body>
</html>
