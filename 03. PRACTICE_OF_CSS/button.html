<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botton</title>
    <style>
      .btn {
        color: white;
        background: 2px solid;
        position: absolute;
        height: 40px;
        width: 70px;
        top: 20px;
        left: 20px;
        background-color: rgba(0, 255, 0, 0.5);
        border-radius: 5px;
      }
      .btn:hover {
        background-color: yellow;
        color: white;

        transform: scale(1.5) translate(50px);
      }
    </style>
  </head>
  <body>
    <!-- Button Design -->
    <button class="btn">Click Here</button>
  </body>
</html>
