<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <style>
      body {
        background-color: rgb(253, 231, 189);
      }
      .form-container {
        height: 290px;
        width: 280px;
        background-color: rgb(20, 200, 30);
        margin: 71px;
        border-radius: 10px;
        box-shadow: 5px 10px 15px rgba(0, 0, 0, 0.5);
      }
      h1 {
        font-size: 1.5rem;
        margin-left: 30px;
        font-family: cursive;
        color: rgb(12, 10, 12);
      }
      #name {
        margin-left: 50px;
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 6px;
      }
      #email {
        margin-left: 50px;
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 6px;
      }
      #passw {
        margin-left: 50px;
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 6px;
      }
      #dob {
        margin-left: 50px;
        background-color: black;
        color: white;
        border: 1px solid white;
        border-radius: 6px;
      }
      label {
        margin-left: 50px;
        padding-top: 10px;
        display: block;
      }
      .btn {
        margin-left: 85px;
        margin-top: 10px;
        height: 30px;
        width: 100px;
        display: inline-block;
        text-align: center;
        border-radius: 10px 0px 10px 0px;
        background-color: #e673ac;
      }
      .footer {
        height: 100px;
        background-color: black;
        color: white;
        text-align: center;
        padding-top: 10px;
      }
      a {
        text-decoration: none;
        margin-top: 5px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h1>Submit This Form</h1>
      <form action="">
        <label class="label" for="name">Name:</label>
        <input type="text" id="name" name="name" required />
        <label for="email">Email:</label>
        <input type="email" id="email" required />
        <label for="passw">Passw:</label>
        <input type="password" id="passw" name="password" />
        <label for="dob">DOB:</label>
        <input type="date" id="dob" name="dob" />
        <button class="btn">Submit!</button>
      </form>
    </div>
    <div class="footer">
      <section>
        <p>Copyright&copy;Laxman rawat</p>
        <a href="#">contact us</a>
      </section>
    </div>
  </body>
</html>
