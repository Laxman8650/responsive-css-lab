<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <!-- <link rel="stylesheet" href="/assets/style.css" /> -->
    <style>
      /* Css of navbar */
      /* Set navbar */
      .navbar {
        height: 60px;
        background-color: black;
        color: white;
      }
      /* Amazon.in Css */
      #logo {
        font-size: 25px;
        color: rgb(234, 140, 17);
        font-family: "Times New Roman", Times, serif;
        text-transform: capitalize;
      }
      /* Search button css */
      #search-btn {
        color: black;
        background-color: orange;
      }
      /* Mouse Hover in CSS button */
      #search-btn:hover {
        color: white;
        background-color: #080900;
      }
      /* Anchor Tag Css */
      a {
        margin-right: 200px;
        text-decoration: none;
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- Code of Navbar(Creating a amazon navbar)  -->
    <div class="navbar">
      <a id="logo">amazon.in</a>
      <a href="account.html">Acount</a>
      <a href="mycart.html">Mycart</a>
      <a href="contact.html">Contact us</a>
      <input type="text" placeholder="Search Here!" />
      <button id="search-btn">Search</button>
    </div>
  </body>
</html>
