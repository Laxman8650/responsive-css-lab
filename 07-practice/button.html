<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botton</title>
    <style>
      .btn {
        color: rgb(70, 41, 41);
        background: 2px solid;
        position: absolute;
        height: 40px;
        width: 70px;
        top: 20px;
        left: 20px;
        background-color: rgba(0, 255, 0, 0.5);
        border-radius: 5px;
        cursor: pointer;
        transition:
          transform 0.8 ease-in-out,
          background-color 0.3s ease;
      }
      .btn:hover {
        background-color: rgba(0, 255, 0, 0.4);
        box-shadow:
          0 0 15px rgba(0, 255, 136, 0.6),
          0 0 5px rgba(0, 255, 136, 0.4);
        color: black;
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <!-- Button Design -->
    <button class="btn">Click Here</button>
  </body>
</html>
