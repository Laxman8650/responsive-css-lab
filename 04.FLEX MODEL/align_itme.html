<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Align</title>
    <style>
      .container {
        height: 300px;
        width: 350px;
        background-color: darkcyan;
        border: 2px solid #000;
        display: flex;
        /* align-items- flex-start(Default), flex-end, center, stretch, baseline */
        /* align-items: end; */
        /* justify-content: space-between; */
        /* flex-wrap: wrap; */
        /* align-content: center; */
      }
      .box {
        height: 50px;
        width: 50px;
        margin: 3px;
        border: 2px solid;
        min-width: 0;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="box1" class="box">Box1</div>
      <div id="box2" class="box">Box2</div>
      <div id="box3" class="box">Box3</div>
      <div id="box4" class="box">Box4</div>
      <div id="box5" class="box">Box5</div>
      <div id="box6" class="box">Box6</div>
      <div id="box7" class="box">Box7</div>
      <div id="box8" class="box">Box8</div>
      <div id="box9" class="box">Box9</div>
    </div>
  </body>
</html>
