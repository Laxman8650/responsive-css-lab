<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Effect</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="icon_effect.css" />
  </head>
  <body>
    <h1>Transition & Tooltip Effect</h1>
    <div class="icon-container">
      <div class="icon-box">
        <span class="tooltip">Instagram</span>
        <i class="fa-brands fa-instagram social-icon ig"></i>
      </div>
      <div class="icon-box">
        <span class="tooltip">Facebook</span>
        <i class="fa-brands fa-facebook social-icon fb"></i>
      </div>
      <div class="icon-box">
        <span class="tooltip">Follow me on GitHub</span>
        <i class="fa-brands fa-github social-icon git"></i>
      </div>

      <div class="icon-box">
        <span class="tooltip">YouTube/Subscribe</span>
        <i class="fa-brands fa-youtube social-icon yt"></i>
      </div>
    </div>
  </body>
</html>
