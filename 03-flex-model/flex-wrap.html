<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Wrap</title>
    <style>
      .container {
        height: 300px;
        width: 300px;
        background-color: aquamarine;
        border: 2px solid;
        display: flex;
        flex-wrap: wrap-reverse;
      }
      .box {
        height: 70px;
        width: 60px;
        border: 2px solid;
        margin: 5px;
      }
      #box1 {
        color: brown;
      }
      #box2 {
        background-color: rgb(165, 149, 42);
      }
      #box3 {
        background-color: rgb(173, 251, 94);
      }
      #box4 {
        background-color: rgb(210, 128, 128);
      }
      #box5 {
        background-color: rgb(126, 33, 83);
      }
      #box6 {
        background-color: rgb(38, 215, 11);
      }
      #box7 {
        background-color: rgb(138, 11, 11);
      }
      #box8 {
        background-color: rgb(240, 213, 38);
      }
      .container2 {
        margin-top: 15px;
        height: 250px;
        /* gap Proerties- Row Gap, Column Gap shorthand- gap: row-gap column-gap */
        gap: 20px 5px;
        width: 250px;
        background-color: aquamarine;
        border: 2px solid;
        display: flex;
        /*(Shorthand) Flex-flow- Flex Direction , Flex Wrap */
        flex-flow: row wrap;
        justify-content: space-between;
        align-content: start;
      }
      .item {
        height: 40px;
        width: 40px;
        border: 2px solid;
        min-width: 0;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <!-- flex-wrap- nowrap, wrap, wrap-reverse  -->
    <div class="container">
      <div id="box1" class="box">Item flex 1</div>
      <div id="box2" class="box">Item flex 2</div>
      <div id="box3" class="box">Item flex 3</div>
      <div id="box4" class="box">Item flex 4</div>
      <div id="box5" class="box">Item flex 5</div>
      <div id="box6" class="box">Item flex 6</div>
      <div id="box7" class="box">Item flex 7</div>
      <div id="box8" class="box">Item flex 8</div>
      <div id="box8" class="box">Item flex 9</div>
    </div>
    <div class="container2">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
      <div class="item">Item 7</div>
      <div class="item">Item 8</div>
      <div class="item">Item 9</div>
      <div class="item">Item 10</div>
      <div class="item">Item 11</div>
    </div>
  </body>
</html>
