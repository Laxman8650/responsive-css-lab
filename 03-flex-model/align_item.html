<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Align Items</title>
    <style>
      .container {
        height: 400px;
        width: 450px;
        background-color: darkcyan;
        border: 2px solid #000;
        display: flex;
        flex-direction: column;
        /* align-items- flex-start(Default), flex-end, center, stretch, baseline */
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        /* align-content: flex-start; */
      }
      .box {
        height: 50px;
        width: 50px;
        margin: 3px;
        border: 2px solid;
        min-width: 0;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="box1" class="box">Box1</div>
      <div id="box2" class="box">Box2</div>
      <div id="box3" class="box">Box3</div>
      <div id="box4" class="box">Box4</div>
      <div id="box5" class="box">Box5</div>
      <div id="box6" class="box">Box6</div>
      <div id="box7" class="box">Box7</div>
      <div id="box8" class="box">Box8</div>
      <div id="box9" class="box">Box9</div>
      <div id="box10" class="box">Box10</div>
      <div id="box11" class="box">Box11</div>
      <div id="box12" class="box">Box12</div>
      <div id="box13" class="box">Box13</div>
      <div id="box14" class="box">Box14</div>
      <div id="box15" class="box">Box15</div>
      <div id="box16" class="box">Box16</div>
      <div id="box17" class="box">Box17</div>
      <div id="box18" class="box">Box18</div>
      <div id="box19" class="box">Box19</div>
      <div id="box20" class="box">Box20</div>
      <div id="box21" class="box">Box21</div>
      <div id="box22" class="box">Box22</div>
    </div>
  </body>
</html>
