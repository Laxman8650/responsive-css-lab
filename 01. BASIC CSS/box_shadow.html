<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      display: flex;
      justify-content: center;
    }
    .main {
      width: 400px;
      height: 500px;
      background-color: #f5cfcf;
      /* border: 2px solid; */
      padding-top: 10px;
      display: flex;
      justify-content: center;
      border-radius: 20px;
      /* Box Shadow: 0px- X-offset, 0px- Y-offset, 10px- Shadow Blur, 
      Inset- Shadow applyed inside the box, 
      2px- all Direction(The all direction property works when X and Y offset are 0px) */
      box-shadow: 0px 0px 10px 2px black;
    }
  </style>
  <body>
    <div class="main">Welcome My World</div>
  </body>
</html>
