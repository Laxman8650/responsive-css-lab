<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      display: flex;
      justify-content: center;
    }
    .main {
      width: 400px;
      height: 500px;
      background-color: #fefefe;
      /* border: 2px solid; */
      padding-top: 10px;
      display: flex;
      justify-content: center;
      border-radius: 20px;
      /* Box Shadow: 0px- X-offset, 0px- Y-offset, 10px- Shadow Blur,
      Inset- Shadow applyed inside the box,
      2px- all Direction(The all direction property works when X and Y offset are 0px) */
     box-shadow: rgba(50, 50, 93, 0.25) 0px 30px 60px -12px inset, rgba(0, 0, 0, 0.3) 0px 18px 36px -18px inset;
  </style>
  <body>
    <div class="main">Welcome My World</div>
  </body>
</html>
